<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚洲文旅智搜 - 文旅项目智能搜索与研判平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #080c14; --bg-elevated: #0f1520; --card: #141d2e; --card-hover: #1a2540; --border: #1e2d4a; --accent: #d4a24e; --accent-glow: rgba(212,162,78,0.3); --accent2: #2dd4a8; --accent2-glow: rgba(45,212,168,0.2); --fg: #e8eaf0; --fg-muted: #7a8ba8; --danger: #ef4444; --warning: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Noto Serif SC', serif; }
        .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(30,45,74,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(30,45,74,0.3) 1px, transparent 1px); background-size: 60px 60px; }
        .grid-bg::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(212,162,78,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(45,212,168,0.04) 0%, transparent 40%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        .search-glow { box-shadow: 0 0 0 1px var(--border), 0 0 40px var(--accent-glow); transition: box-shadow 0.4s; }
        .search-glow:focus-within { box-shadow: 0 0 0 2px var(--accent), 0 0 60px var(--accent-glow), 0 0 120px rgba(212,162,78,0.1); }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }
        .pulse-ring::before, .pulse-ring::after { content: ''; position: absolute; inset: -8px; border: 2px solid var(--accent); border-radius: inherit; animation: pulse-ring 2s ease-out infinite; }
        .pulse-ring::after { animation-delay: 1s; }
        @keyframes crawl { 0% { width: 0; } 100% { width: 100%; } }
        .crawl-bar { animation: crawl var(--duration, 2s) ease-out forwards; }
        @keyframes countUp { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; transform: translateY(-2px); } }
        .count-anim { animation: countUp 0.3s ease; }
        .project-card { transition: all 0.3s ease; border: 1px solid var(--border); }
        .project-card:hover { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.4); transform: translateY(-4px); }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
        .tab-btn { padding: 10px 20px; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.3s; color: var(--fg-muted); font-size: 14px; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn:hover:not(.active) { color: var(--fg); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeSlide 0.3s ease; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 16px; max-width: 1000px; width: 100%; max-height: 85vh; overflow-y: auto; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; display: flex; align-items: center; gap: 8px; }
        .toast.success { background: linear-gradient(135deg, #065f46, #047857); border: 1px solid #10b981; }
        .toast.info { background: linear-gradient(135deg, #1e3a5f, #1e40af); border: 1px solid #3b82f6; }
        .toast.warning { background: linear-gradient(135deg, #78350f, #92400e); border: 1px solid #f59e0b; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(60px); } }
        .crawl-node { animation: nodePulse 1.5s infinite; }
        @keyframes nodePulse { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); } 50% { box-shadow: 0 0 0 8px transparent; } }
        .report-block { background: var(--card); border-left: 3px solid var(--accent); padding: 16px 20px; margin: 12px 0; border-radius: 0 8px 8px 0; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: var(--success); animation: blink 1.5s infinite; }
        .status-dot.crawling { background: var(--warning); animation: blink 0.6s infinite; }
        .status-dot.offline { background: var(--fg-muted); }
        .particle { position: absolute; width: 3px; height: 3px; background: var(--accent); border-radius: 50%; pointer-events: none; opacity: 0; animation: floatParticle var(--dur, 6s) var(--delay, 0s) infinite; }
        @keyframes floatParticle { 0% { opacity: 0; transform: translateY(0) scale(0); } 20% { opacity: 0.6; transform: translateY(-20px) scale(1); } 80% { opacity: 0.3; transform: translateY(-80px) scale(0.6); } 100% { opacity: 0; transform: translateY(-120px) scale(0); } }
        .source-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .source-badge:hover { transform: scale(1.05); }
        .source-badge.active { border-color: currentColor; }
        .source-xhs { background: rgba(255,44,85,0.15); color: #ff2d55; }
        .source-wechat { background: rgba(7,193,96,0.15); color: #07c160; }
        .source-douyin { background: rgba(37,244,238,0.15); color: #25f4ee; }
        .source-web { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .source-weibo { background: rgba(230,36,41,0.15); color: #e62429; }
        .source-bilibili { background: rgba(0,161,214,0.15); color: #00a1d6; }
        .highlight-match { background: rgba(212,162,78,0.25); color: var(--accent); padding: 0 2px; border-radius: 2px; }
        @media (max-width: 768px) { .hero-title { font-size: 2rem !important; } .search-box { width: 95% !important; } .modal-content { max-height: 90vh; } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="particles" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;"></div>
    <div class="toast-container" id="toastContainer"></div>
    <nav style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(8,12,20,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);">
        <div style="max-width:1400px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#e8c878);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#080c14;" class="serif">亚</div>
                <div>
                    <div style="font-size:16px;font-weight:700;letter-spacing:1px;" class="serif">亚洲文旅智搜</div>
                    <div style="font-size:10px;color:var(--fg-muted);letter-spacing:2px;">ASIA CULTURAL TOURISM INTELLIGENCE</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
                <a href="https://notebooklm.google.com/" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.background='linear-gradient(135deg,var(--accent),#e8c878)';this.style.color='#080c14'" onmouseout="this.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';this.style.color='var(--accent)'" id="notebooklmLink" aria-label="打开 NotebookLM">
                    <i class="fab fa-google"></i> <span>NotebookLM</span> <i class="fas fa-external-link-alt" style="font-size:10px;"></i>
                </a>
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-muted);">
                    <span class="status-dot online"></span> <span>引擎在线</span>
                </div>
            </div>
        </div>
    </nav>
    <main id="mainContent" style="position:relative;z-index:1;">
        <section id="heroSection" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 40px;transition:all 0.5s ease;">
            <div style="text-align:center;margin-bottom:48px;">
                <div style="font-size:14px;color:var(--accent);letter-spacing:6px;margin-bottom:16px;font-weight:500;">CULTURAL TOURISM INTELLIGENCE PLATFORM</div>
                <h1 class="serif hero-title" style="font-size:3.5rem;font-weight:900;line-height:1.2;margin-bottom:16px;">
                    <span style="color:var(--fg);">亚洲文旅</span><span style="color:var(--accent);">智搜</span>
                </h1>
                <p style="font-size:18px;color:var(--fg-muted);max-width:600px;margin:0 auto;line-height:1.8;">
                    聚合全网数据源，智能搜索亚洲文旅项目全维度信息<br>
                    从投资策划到运营数据，一键搜索 · 综合研判 · 报告生成
                </p>
            </div>
            <div class="search-glow" style="width:min(700px,90%);background:var(--card);border-radius:16px;padding:6px;position:relative;" id="searchBox">
                <div style="display:flex;align-items:center;">
                    <i class="fas fa-search" style="padding:0 16px;color:var(--accent);font-size:18px;"></i>
                    <input type="text" id="searchInput" placeholder="输入文旅项目名称、区位、投资商等关键词..." style="flex:1;background:none;border:none;outline:none;color:var(--fg);font-size:16px;padding:14px 0;font-family:inherit;" aria-label="搜索关键词" autocomplete="off">
                    <button onclick="startSearch()" id="searchBtn" style="padding:14px 28px;background:linear-gradient(135deg,var(--accent),#e8c878);color:#080c14;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:inherit;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                        智能搜索
                    </button>
                </div>
            </div>
            <div style="margin-top:24px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:700px;" id="sourceSelector">
                <span class="source-badge source-xhs active" data-source="xiaohongshu" onclick="toggleSource(this)"> <i class="fas fa-book-open"></i> 小红书 </span>
                <span class="source-badge source-wechat active" data-source="wechat" onclick="toggleSource(this)"> <i class="fab fa-weixin"></i> 微信公众号 </span>
                <span class="source-badge source-douyin active" data-source="douyin" onclick="toggleSource(this)"> <i class="fab fa-tiktok"></i> 抖音 </span>
                <span class="source-badge source-web active" data-source="website" onclick="toggleSource(this)"> <i class="fas fa-globe"></i> 网站 </span>
                <span class="source-badge source-weibo active" data-source="weibo" onclick="toggleSource(this)"> <i class="fab fa-weibo"></i> 微博 </span>
                <span class="source-badge source-bilibili active" data-source="bilibili" onclick="toggleSource(this)"> <i class="fas fa-play-circle"></i> B 站 </span>
            </div>
            <div style="margin-top:32px;text-align:center;">
                <div style="font-size:12px;color:var(--fg-muted);margin-bottom:12px;">热门搜索</div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;" id="hotTags">
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('迪士尼')">迪士尼</span>
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('环球影城')">环球影城</span>
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('长隆')">长隆</span>
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('熊猫')">熊猫</span>
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('主题公园')">主题公园</span>
                </div>
            </div>
            <div style="margin-top:48px;display:flex;gap:40px;justify-content:center;flex-wrap:wrap;">
                <div style="text-align:center;">
                    <div style="font-size:28px;font-weight:900;color:var(--accent);" class="serif" id="statProjects">0</div>
                    <div style="font-size:12px;color:var(--fg-muted);">项目数据库</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:28px;font-weight:900;color:var(--accent2);" class="serif" id="statSources">0</div>
                    <div style="font-size:12px;color:var(--fg-muted);">数据源接入</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:28px;font-weight:900;color:var(--fg);" class="serif" id="statReports">0</div>
                    <div style="font-size:12px;color:var(--fg-muted);">分析报告</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:28px;font-weight:900;color:var(--warning);" class="serif" id="statData">0</div>
                    <div style="font-size:12px;color:var(--fg-muted);">数据条目</div>
                </div>
            </div>
        </section>
        <section id="resultsSection" style="display:none;padding:80px 20px 60px;max-width:1400px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button onclick="resetSearch()" style="padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--fg);cursor:pointer;font-family:inherit;font-size:13px;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
                        <i class="fas fa-arrow-left"></i> 重新搜索
                    </button>
                    <div style="font-size:14px;color:var(--fg-muted);">
                        搜索 "<span id="searchKeyword" style="color:var(--accent);font-weight:600;"></span>" 共找到 <span id="resultCount" style="color:var(--accent2);font-weight:600;"></span> 个相关项目
                    </div>
                </div>
                <button onclick="generateReport()" id="genReportBtn" style="padding:10px 24px;background:linear-gradient(135deg,var(--accent2),#14b8a6);color:#080c14;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:all 0.3s;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                    <i class="fas fa-file-alt"></i> 生成综合研判报告
                </button>
            </div>
            <div id="crawlPanel" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                    <i class="fas fa-spider" style="color:var(--accent);font-size:18px;"></i>
                    <span style="font-weight:700;font-size:15px;">全网数据爬取中</span>
                    <span class="status-dot crawling"></span>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;" id="crawlProgressList">
                </div>
            </div>
            <div id="resultsList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;">
            </div>
        </section>
        <section id="reportSection" style="display:none;padding:0 20px 60px;max-width:1400px;margin:0 auto;">
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;">
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
                    <div>
                        <h2 class="serif" style="font-size:24px;font-weight:900;color:var(--accent);margin-bottom:4px;">
                            <i class="fas fa-chart-line" style="margin-right:8px;"></i>综合研判分析报告
                        </h2>
                        <div style="font-size:13px;color:var(--fg-muted);" id="reportMeta"></div>
                    </div>
                    <div style="display:flex;gap:10px;">
                        <button onclick="copyReport()" style="padding:10px 20px;background:var(--card);border:1px solid var(--accent);border-radius:8px;color:var(--accent);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all 0.2s;" onmouseover="this.style.background='var(--accent)';this.style.color='#080c14'" onmouseout="this.style.background='var(--card)';this.style.color='var(--accent)'">
                            <i class="fas fa-copy"></i> 一键复制
                        </button>
                        <button onclick="feedToNotebookLM()" style="padding:10px 20px;background:linear-gradient(135deg,var(--accent),#e8c878);color:#080c14;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all 0.3s;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                            <i class="fab fa-google"></i> 投喂 NotebookLM
                        </button>
                    </div>
                </div>
                <div id="reportContent" style="line-height:1.9;font-size:14px;"></div>
            </div>
        </section>
    </main>
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
        <div class="modal-content" id="modalContent" role="dialog" aria-modal="true">
        </div>
    </div>
    <script>
        // ========== 数据集 ==========

                ${swotHtml}
            </div>

            <div style="margin-top:24px;display:flex;gap:12px;justify-content:flex-end;">
                <button onclick="copyProjectInfo('${project.id}')" style="padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--fg);cursor:pointer;">
                    <i class="fas fa-copy"></i> 复制信息
                </button>
                <button onclick="addToReport('${project.id}')" style="padding:8px 16px;background:linear-gradient(135deg,var(--accent),#e8c878);color:#080c14;border:none;border-radius:8px;cursor:pointer;font-weight:600;">
                    <i class="fas fa-plus"></i> 加入研判报告
                </button>
            </div>
        </div>
    `;
    
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    const modal = document.getElementById('detailModal');
    modal.classList.remove('show');
    document.body.style.overflow = '';
}

// 复制项目信息
function copyProjectInfo(id) {
    const project = projects.find(p => p.id == id);
    const text = `项目名称：${project.name}
位置：${project.location}
类型：${project.type}
投资规模：${project.investment}
年客流量：${project.annualVisitors}
年营收：${project.annualRevenue}
酒店客房：${project.hotelRooms}
`;
    navigator.clipboard.writeText(text).then(() => {
        showToast('项目信息已复制到剪贴板', 'success');
    });
}

// 添加到研判报告
function addToReport(id) {
    const project = projects.find(p => p.id == id);
    if (!currentReport.includes(project.name)) {
        currentReport += `\n\n=== ${project.name} ===\n`;
        currentReport += `位置：${project.location}\n`;
        currentReport += `投资规模：${project.investment}\n`;
        currentReport += `年客流量：${project.annualVisitors}\n`;
        currentReport += `年营收：${project.annualRevenue}\n`;
        currentReport += `酒店客房：${project.hotelRooms}\n`;
        currentReport += `核心优势：${project.swot.strengths.slice(0,2).join('、')}\n`;
        currentReport += `主要风险：${project.swot.threats.slice(0,2).join('、')}\n`;
        closeModal();
        showToast('已添加到研判报告', 'success');
    } else {
        closeModal();
        showToast('该项目已在报告中', 'info');
    }
}

// 生成综合研判报告
function generateReport() {
    if (currentResults.length === 0) {
        showToast('请先搜索项目', 'warning');
        return;
    }

    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('reportSection').style.display = 'block';
    
    const reportMeta = document.getElementById('reportMeta');
    const reportContent = document.getElementById('reportContent');
    const keyword = document.getElementById('searchKeyword').innerText;
    
    reportMeta.innerHTML = `
        搜索关键词：<span style="color:var(--accent);font-weight:600;">${keyword}</span> | 
        分析项目数：<span style="color:var(--accent2);font-weight:600;">${currentResults.length}</span> | 
        生成时间：${new Date().toLocaleString()}
    `;

    // 生成报告内容
    let report = `# 亚洲文旅项目综合研判报告\n\n`;
    report += `## 一、搜索概况\n`;
    report += `- 搜索关键词：${keyword}\n`;
    report += `- 匹配项目数：${currentResults.length}\n`;
    report += `- 数据源覆盖：${Array.from(activeSources).map(s => sourceNames[s]).join('、')}\n\n`;
    
    report += `## 二、项目对比分析\n\n`;
    currentResults.forEach((p, index) => {
        report += `### ${index + 1}. ${p.name}\n`;
        report += `**基本信息**\n`;
        report += `- 位置：${p.location}\n`;
        report += `- 类型：${p.type}\n`;
        report += `- 投资规模：${p.investment}\n`;
        report += `- 年客流量：${p.annualVisitors}\n`;
        report += `- 年营收：${p.annualRevenue}\n\n`;
        
        report += `**SWOT分析**\n`;
        report += `优势：${p.swot.strengths.slice(0,3).join('、')}\n`;
        report += `劣势：${p.swot.weaknesses.slice(0,2).join('、')}\n`;
        report += `机会：${p.swot.opportunities.slice(0,2).join('、')}\n`;
        report += `威胁：${p.swot.threats.slice(0,2).join('、')}\n\n`;
        
        report += `**社交媒体表现**\n`;
        const topPlatform = Object.entries(p.social).reduce((a, b) => 
            (b[1].posts || b[1].articles || b[1].videos || 0) > (a[1].posts || a[1].articles || a[1].videos || 0) ? b : a
        );
        report += `- 主战场：${sourceNames[topPlatform[0]]}\n`;
        report += `- 内容量：${topPlatform[1].posts || topPlatform[1].articles || topPlatform[1].videos}\n`;
        report += `- 互动量：${topPlatform[1].likes || topPlatform[1].reads || topPlatform[1].views}\n\n`;
    });

    report += `## 三、综合建议\n`;
    report += `1. 重点关注${currentResults[0]?.swot.strengths[0] || '核心IP'}优势项目\n`;
    report += `2. 警惕${currentResults[0]?.swot.threats[0] || '市场竞争'}风险因素\n`;
    report += `3. 建议结合${Array.from(activeSources).slice(0,2).map(s => sourceNames[s]).join('与')}数据源进行深度分析\n`;

    reportContent.innerHTML = report.replace(/\n/g, '<br>');
    currentReport = report;
    
    showToast('报告生成成功', 'success');
}

// 复制报告
function copyReport() {
    navigator.clipboard.writeText(currentReport).then(() => {
        showToast('报告已复制到剪贴板', 'success');
    });
}

// 投喂NotebookLM
function feedToNotebookLM() {
    if (!currentReport) {
        showToast('请先生成报告', 'warning');
        return;
    }
    
    const encoded = encodeURIComponent(currentReport);
    const url = `https://notebooklm.google.com/?data=${encoded}`;
    window.open(url, '_blank');
    showToast('正在跳转至NotebookLM...', 'info');
}

// Toast通知
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i>
        <span>${message}</span>
    `;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    // 初始化统计数字
    document.getElementById('statProjects').innerText = projects.length.toLocaleString();
    document.getElementById('statSources').innerText = activeSources.size.toLocaleString();
    document.getElementById('statReports').innerText = '0';
    document.getElementById('statData').innerText = '12,847';
    
    // 添加粒子效果
    const particles = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.setProperty('--dur', `${3 + Math.random() * 6}s`);
        particle.style.setProperty('--delay', `${Math.random() * 5}s`);
        particles.appendChild(particle);
    }
    
    // 搜索框回车事件
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') startSearch();
    });
});
</script>
